---
name: Publish rule containers

on: # yamllint disable-line rule:truthy
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "OCI image tag, for example 2.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: preprocessing
            env_file: workflow/envs/preprocessing.yml
            image: cadd-sv-preprocessing
          - environment: sv
            env_file: workflow/envs/SV.yml
            image: cadd-sv-sv
          - environment: nt
            env_file: workflow/envs/NT.yml
            image: cadd-sv-nt
          - environment: training
            env_file: workflow/envs/training.yml
            image: cadd-sv-training

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image version
        id: version
        env:
          DISPATCH_TAG: ${{ inputs.image_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${DISPATCH_TAG}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${REF_NAME#v}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and publish ${{ matrix.environment }} image
        uses: docker/build-push-action@v6
        with:
          context: caddsv
          file: caddsv/containers/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.version.outputs.value }}
          build-args: |
            ENV_FILE=${{ matrix.env_file }}
            CADD_SV_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.environment }}
          cache-to: type=gha,mode=max,scope=${{ matrix.environment }}
          provenance: true
          sbom: true
